name: Colloquium Variant 11 CI

on:
  push:
    branches:
      - feature/colloquium-variant11-used-cars
      - main
    paths:
      - "colloquium/variant11-used-cars-marketplace/**"
      - ".github/workflows/colloquium-variant11.yml"
  pull_request:
    branches:
      - main
    paths:
      - "colloquium/variant11-used-cars-marketplace/**"
      - ".github/workflows/colloquium-variant11.yml"

jobs:
  test:
    name: Run tests for used cars marketplace
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: colloquium/variant11-used-cars-marketplace

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v

      - name: Build Docker image
        run: docker build -t used-cars-marketplace-11 .
